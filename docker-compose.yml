services:
  itl-gerenciador-usuarios-api:
    container_name: itl-gerenciador-usuarios-api
    build:
      context: .
      dockerfile: itl-gerenciador-usuarios-api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    restart: always
