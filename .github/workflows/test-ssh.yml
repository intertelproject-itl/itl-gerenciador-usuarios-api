name: Testar SSH VPS

on:
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Testar conexão SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          debug: true
          script: |
            echo "SSH FUNCIONOU"
            echo "Usuário:"
            whoami
            echo "Hostname:"
            hostname
            echo "Diretório atual:"
            pwd
